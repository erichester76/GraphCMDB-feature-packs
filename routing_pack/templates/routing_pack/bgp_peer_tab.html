<div class="p-4">
  <h2 class="text-lg font-semibold mb-2">BGP Peer Details</h2>
  <dl>
    <dt>Name</dt><dd>{{ node.name }}</dd>
    <dt>Peer IP</dt><dd>{{ node.peer_ip }}</dd>
    <dt>Remote AS</dt><dd>{{ node.remote_as }}</dd>
    <dt>Local AS</dt><dd>{{ node.local_as }}</dd>
    <dt>Description</dt><dd>{{ node.description }}</dd>
  </dl>
</div>
